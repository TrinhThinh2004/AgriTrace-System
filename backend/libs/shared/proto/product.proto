syntax = "proto3";

package product;

// Product Service
service ProductService {
  // ABAC ownership checks (used by api-gateway OwnershipGuard)
  rpc GetBatchById         (GetBatchByIdRequest)         returns (BatchResponse);
  rpc GetBatchByCode       (GetBatchByCodeRequest)       returns (BatchResponse);
  rpc GetFarmById          (GetFarmByIdRequest)          returns (FarmResponse);
  rpc CheckFarmOwnership   (CheckFarmOwnershipRequest)   returns (OwnershipResponse);
  rpc CheckBatchOwnership  (CheckBatchOwnershipRequest)  returns (OwnershipResponse);

  // Crop Category CRUD
  rpc CreateCropCategory   (CreateCropCategoryRequest)   returns (CropCategoryResponse);
  rpc UpdateCropCategory   (UpdateCropCategoryRequest)   returns (CropCategoryResponse);
  rpc DeleteCropCategory   (DeleteCropCategoryRequest)   returns (EmptyResponse);
  rpc GetCropCategoryById  (GetCropCategoryByIdRequest)  returns (CropCategoryResponse);
  rpc ListCropCategories   (ListCropCategoriesRequest)   returns (ListCropCategoriesResponse);

  // Farm CRUD
  rpc CreateFarm           (CreateFarmRequest)           returns (FarmResponse);
  rpc UpdateFarm           (UpdateFarmRequest)           returns (FarmResponse);
  rpc DeleteFarm           (DeleteFarmRequest)           returns (EmptyResponse);
  rpc ListFarms            (ListFarmsRequest)            returns (ListFarmsResponse);

  // Farm Certification workflow
  rpc RequestCertification (RequestCertificationRequest) returns (FarmResponse);
  rpc ApproveCertification (ApproveCertificationRequest) returns (FarmResponse);
  rpc RejectCertification  (RejectCertificationRequest)  returns (FarmResponse);

  //Batch CRUD
  rpc CreateBatch          (CreateBatchRequest)          returns (BatchResponse);
  rpc UpdateBatch          (UpdateBatchRequest)          returns (BatchResponse);
  rpc DeleteBatch          (DeleteBatchRequest)          returns (EmptyResponse);
  rpc ListBatches          (ListBatchesRequest)          returns (ListBatchesResponse);
  rpc TransitionBatchStatus(TransitionBatchStatusRequest) returns (BatchResponse);

  // Certification Templates (admin)
  rpc CreateCertificationTemplate (CreateTemplateRequest)  returns (TemplateResponse);
  rpc UpdateCertificationTemplate (UpdateTemplateRequest)  returns (TemplateResponse);
  rpc ListCertificationTemplates  (ListTemplatesRequest)   returns (ListTemplatesResponse);
  rpc GetCertificationTemplate    (GetTemplateRequest)     returns (TemplateResponse);

  // Checklist Response workflow (farmer + admin)
  rpc StartChecklistResponse      (StartChecklistRequest)         returns (ChecklistResponseDto);
  rpc UpsertChecklistAnswer       (UpsertAnswerRequest)           returns (ChecklistResponseItemDto);
  rpc SubmitChecklistResponse     (SubmitChecklistRequest)        returns (ChecklistResponseDto);
  rpc GetLatestChecklistByFarm    (GetLatestChecklistRequest)     returns (ChecklistResponseDto);
  rpc GetChecklistResponseById    (GetChecklistResponseRequest)   returns (ChecklistResponseDto);
  rpc ApproveChecklistResponse    (ReviewChecklistRequest)        returns (ChecklistResponseDto);
  rpc RejectChecklistResponse     (ReviewChecklistRequest)        returns (ChecklistResponseDto);
}

// Common 
message EmptyResponse {}

message Pagination {
  int32 page  = 1;
  int32 limit = 2;
  int32 total = 3;
}

// ───────── ABAC ─────────
message CheckFarmOwnershipRequest {
  string user_id = 1;
  string farm_id = 2;
}

message CheckBatchOwnershipRequest {
  string user_id  = 1;
  string batch_id = 2;
}

message OwnershipResponse {
  bool allowed = 1;
}

// ───────── Crop Category ─────────
message CropCategoryResponse {
  string id          = 1;
  string name        = 2;
  string description = 3;
  string status      = 4;
  string created_at  = 5;
  string updated_at  = 6;
}

message CreateCropCategoryRequest {
  string name        = 1;
  string description = 2;
}

message UpdateCropCategoryRequest {
  string id          = 1;
  string name        = 2;
  string description = 3;
  string status      = 4;
}

message DeleteCropCategoryRequest {
  string id = 1;
}

message GetCropCategoryByIdRequest {
  string id = 1;
}

message ListCropCategoriesRequest {
  string status = 1;
  int32  page   = 2;
  int32  limit  = 3;
}

message ListCropCategoriesResponse {
  repeated CropCategoryResponse items = 1;
  Pagination pagination               = 2;
}

// ───────── Farm ─────────
message FarmResponse {
  string id                            = 1;
  string owner_id                      = 2;
  string name                          = 3;
  string address                       = 4;
  string location_lat                  = 5;
  string location_long                 = 6;
  string area_hectares                 = 7;
  string certification_status          = 8;
  string status                        = 9;
  string created_at                    = 10;
  string updated_at                    = 11;
  string requested_certification_type  = 12;
  string certified_at                  = 13;
  string certified_by                  = 14;
  string reject_reason                 = 15;
}

message GetFarmByIdRequest {
  string farm_id = 1;
}

message CreateFarmRequest {
  // optional — Admin có thể truyền owner_id; Farmer sẽ bị ép bằng caller id (lấy từ gRPC metadata)
  string owner_id             = 1;
  string name                 = 2;
  string address              = 3;
  string location_lat         = 4;
  string location_long        = 5;
  string area_hectares        = 6;
  string certification_status = 7;
}

message UpdateFarmRequest {
  string id                   = 1;
  string name                 = 2;
  string address              = 3;
  string location_lat         = 4;
  string location_long        = 5;
  string area_hectares        = 6;
  string certification_status = 7;
  string status               = 8;
}

message DeleteFarmRequest {
  string id = 1;
}

message ListFarmsRequest {
  string owner_id             = 1;
  string status               = 2;
  int32  page                 = 3;
  int32  limit                = 4;
  string certification_status = 5;
}

message ListFarmsResponse {
  repeated FarmResponse items = 1;
  Pagination pagination       = 2;
}

message RequestCertificationRequest {
  string farm_id        = 1;
  string requested_type = 2; // VIETGAP|GLOBALGAP|ORGANIC
}

message ApproveCertificationRequest {
  string farm_id      = 1;
  string granted_type = 2; // optional: nếu admin override; nếu rỗng dùng requested_certification_type
}

message RejectCertificationRequest {
  string farm_id = 1;
  string reason  = 2;
}

// ───────── Batch ─────────
message BatchResponse {
  string id                    = 1;
  string batch_code            = 2;
  string farm_id               = 3;
  string crop_category_id      = 4;
  string name                  = 5;
  string status                = 6;
  string planting_date         = 7;
  string expected_harvest_date = 8;
  string actual_harvest_date   = 9;
  string harvested_quantity    = 10;
  string shipped_quantity      = 11;
  string unit                  = 12;
  string notes                 = 13;
  string created_by            = 14;
  string created_at            = 15;
  string updated_at            = 16;
}

message GetBatchByIdRequest {
  string batch_id = 1;
}

message GetBatchByCodeRequest {
  string batch_code = 1;
}

message CreateBatchRequest {
  string batch_code            = 1;
  string farm_id               = 2;
  string crop_category_id      = 3;
  string name                  = 4;
  string planting_date         = 5;
  string expected_harvest_date = 6;
  string unit                  = 7;
  string notes                 = 8;
}

message UpdateBatchRequest {
  string id                    = 1;
  string name                  = 2;
  string planting_date         = 3;
  string expected_harvest_date = 4;
  string actual_harvest_date   = 5;
  string harvested_quantity    = 6;
  string shipped_quantity      = 7;
  string unit                  = 8;
  string notes                 = 9;
}

message DeleteBatchRequest {
  string id = 1;
}

message ListBatchesRequest {
  string farm_id = 1;
  string status  = 2;
  int32  page    = 3;
  int32  limit   = 4;
}

message ListBatchesResponse {
  repeated BatchResponse items = 1;
  Pagination pagination        = 2;
}

message TransitionBatchStatusRequest {
  string id                  = 1;
  string next_status         = 2;
  string actual_harvest_date = 3;
  string harvested_quantity  = 4;
  string shipped_quantity    = 5;
  string inspection_result   = 6;
}

// ───────── Certification Template ─────────
message ChecklistItemDto {
  string id                = 1;
  string template_id       = 2;
  int32  order             = 3;
  string category          = 4;
  string code              = 5;
  string title             = 6;
  string description       = 7;
  bool   required          = 8;
  bool   evidence_required = 9;
}

message TemplateResponse {
  string code                       = 1;
  string id                         = 2;
  string name                       = 3;
  string cert_type                  = 4;
  int32  version                    = 5;
  bool   active                     = 6;
  string description                = 7;
  string created_at                 = 8;
  string updated_at                 = 9;
  repeated ChecklistItemDto items   = 10;
}

message CreateTemplateRequest {
  string code        = 1;
  string name        = 2;
  string cert_type   = 3;
  int32  version     = 4;
  string description = 5;
  bool   active      = 6;
  // Inline create items
  repeated CreateTemplateItem items = 7;
}

message CreateTemplateItem {
  int32  order             = 1;
  string category          = 2;
  string code              = 3;
  string title             = 4;
  string description       = 5;
  bool   required          = 6;
  bool   evidence_required = 7;
}

message UpdateTemplateRequest {
  string id          = 1;
  string name        = 2;
  string description = 3;
  bool   active      = 4;
}

message GetTemplateRequest {
  string id = 1;
  // Hoặc query bằng code (1 trong 2)
  string code = 2;
}

message ListTemplatesRequest {
  string cert_type = 1;
  bool   active_only = 2;
  int32  page  = 3;
  int32  limit = 4;
}

message ListTemplatesResponse {
  repeated TemplateResponse items = 1;
  Pagination pagination           = 2;
}

// ───────── Checklist Response ─────────
message ChecklistResponseItemDto {
  string id                       = 1;
  string response_id              = 2;
  string item_id                  = 3;
  string answer                   = 4;
  repeated string evidence_asset_ids = 5;
  string created_at               = 6;
  string updated_at               = 7;
}

message ChecklistResponseDto {
  string id            = 1;
  string farm_id       = 2;
  string template_id   = 3;
  string status        = 4;
  string submitted_at  = 5;
  string reviewed_at   = 6;
  string reviewed_by   = 7;
  string notes         = 8;
  string created_at    = 9;
  string updated_at    = 10;
  repeated ChecklistResponseItemDto items = 11;
  TemplateResponse template               = 12;
}

message StartChecklistRequest {
  string farm_id     = 1;
  string template_id = 2;
}

message UpsertAnswerRequest {
  string response_id = 1;
  string item_id     = 2;
  string answer      = 3;
  repeated string evidence_asset_ids = 4;
}

message SubmitChecklistRequest {
  string response_id = 1;
}

message GetLatestChecklistRequest {
  string farm_id = 1;
}

message GetChecklistResponseRequest {
  string response_id = 1;
}

message ReviewChecklistRequest {
  string response_id = 1;
  // approve: granted_type optional (nếu trống dùng template.cert_type)
  string granted_type = 2;
  // reject: reason bắt buộc
  string reason       = 3;
  // notes (approve hoặc reject)
  string notes        = 4;
}
