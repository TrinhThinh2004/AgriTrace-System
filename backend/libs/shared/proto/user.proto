syntax = "proto3";

package user;

// UserService
service UserService {
  // Auth RPCs
  rpc Register      (RegisterRequest)       returns (AuthResponse);
  rpc Login         (LoginRequest)          returns (AuthResponse);
  rpc RefreshTokens (RefreshTokensRequest)  returns (TokenPairResponse);
  rpc Logout        (LogoutRequest)         returns (MessageResponse);

  // User CRUD
  rpc GetProfile    (GetProfileRequest)     returns (UserResponse);
  rpc GetUserById   (GetUserByIdRequest)    returns (UserResponse);
  rpc ListUsers     (ListUsersRequest)      returns (ListUsersResponse);
  rpc CreateUser    (CreateUserRequest)     returns (UserResponse);
  rpc UpdateUser    (UpdateUserRequest)     returns (UserResponse);
  rpc UpdateProfile (UpdateProfileRequest)  returns (UserResponse);
  rpc DeleteUser    (DeleteUserRequest)     returns (MessageResponse);

  // Internal service-to-service RPCs
  rpc ValidateToken (ValidateTokenRequest)  returns (ValidateTokenResponse);

  // Key Management RPCs (chữ ký số)
  rpc GenerateKeyPair (GenerateKeyPairRequest) returns (GenerateKeyPairResponse);
  rpc GetPublicKey    (GetPublicKeyRequest)    returns (PublicKeyResponse);
  rpc ListUserKeys    (ListUserKeysRequest)    returns (ListUserKeysResponse);
  rpc RevokeKey       (RevokeKeyRequest)       returns (MessageResponse);

  // Admin Key Management RPCs
  rpc ListAllKeys    (ListAllKeysRequest)    returns (ListAllKeysResponse);
  rpc AdminRevokeKey (AdminRevokeKeyRequest) returns (MessageResponse);

  // JWT Key Ring RPCs (secret rotation)
  rpc RotateJwtKey       (RotateJwtKeyRequest)       returns (JwtKeyResponse);
  rpc GetJwtKey          (GetJwtKeyRequest)          returns (JwtKeyResponse);
  rpc ListActiveJwtKeys  (ListActiveJwtKeysRequest)  returns (ListJwtKeysResponse);

  // Access Token Blacklist RPCs
  rpc RevokeAccessToken    (RevokeAccessTokenRequest)    returns (MessageResponse);
  rpc IsAccessTokenRevoked (IsAccessTokenRevokedRequest) returns (BoolResponse);

  // Notification RPCs
  rpc CreateNotification (CreateNotificationRequest) returns (NotificationResponse);
  rpc ListNotifications  (ListNotificationsRequest)  returns (ListNotificationsResponse);
  rpc GetUnreadCount     (UserIdRequest)             returns (UnreadCountResponse);
  rpc MarkAsRead         (MarkAsReadRequest)         returns (NotificationResponse);
  rpc MarkAllAsRead      (UserIdRequest)             returns (AffectedResponse);
  rpc DeleteNotification (DeleteNotificationRequest) returns (AffectedResponse);
}

// ── Auth Messages ─────────────────────────────────────────────────
message RegisterRequest {
  string email     = 1;
  string password  = 2;
  string full_name = 3;
  string phone     = 4;
}

message LoginRequest {
  string email    = 1;
  string password = 2;
}

message RefreshTokensRequest {
  string user_id       = 1;
  string refresh_token = 2;
}

message LogoutRequest {
  string user_id = 1;
  string jti     = 2;  // để blacklist access token
  int64  exp     = 3;  // unix seconds
}

message AuthResponse {
  string access_token  = 1;
  string refresh_token = 2;
  UserResponse user    = 3;
}

message TokenPairResponse {
  string access_token  = 1;
  string refresh_token = 2;
}

message MessageResponse {
  string message = 1;
}

// ── User Messages ─────────────────────────────────────────────────
message GetProfileRequest {
  string user_id = 1;
}

message GetUserByIdRequest {
  string user_id = 1;
}

message UserResponse {
  string id         = 1;
  string email      = 2;
  string full_name  = 3;
  string role       = 4;
  string status     = 5;
  string phone      = 6;
  string created_at = 7;
  string avatar_url = 8;
  string address    = 9;
  string bio        = 10;
}

message UpdateProfileRequest {
  string user_id    = 1;
  string full_name  = 2;
  string phone      = 3;
  string avatar_url = 4;
  string address    = 5;
  string bio        = 6;
}

// ── ValidateToken (dùng cho internal service-to-service) ──────────
message ValidateTokenRequest {
  string token = 1;
}

message ValidateTokenResponse {
  bool   valid   = 1;
  string user_id = 2;
  string email   = 3;
  string role    = 4;
}

// ── CRUD Messages ─────────────────────────────────────────────────
message ListUsersRequest {
  string role   = 1;
  int32  page   = 2;
  int32  limit  = 3;
}

message ListUsersResponse {
  repeated UserResponse items = 1;
  Pagination pagination       = 2;
}

message Pagination {
  int32 page  = 1;
  int32 limit = 2;
  int32 total = 3;
}

message CreateUserRequest {
  string email     = 1;
  string password  = 2;
  string full_name = 3;
  string phone     = 4;
  string role      = 5;
}

message UpdateUserRequest {
  string id        = 1;
  string full_name = 2;
  string phone     = 3;
  string role      = 4;
  string status    = 5;
}

message DeleteUserRequest {
  string id = 1;
}

// ── Key Management Messages (chữ ký số) ──────────────────────────
message GenerateKeyPairRequest {
  string user_id   = 1;
  string algorithm = 2;  // "RSA-SHA256" (default)
}

message GenerateKeyPairResponse {
  string key_id      = 1;
  string public_key  = 2;  // PEM format
  string private_key = 3;  // PEM format — CHỈ TRẢ 1 LẦN
  string algorithm   = 4;
}

message GetPublicKeyRequest {
  string key_id = 1;
}

message PublicKeyResponse {
  string key_id     = 1;
  string user_id    = 2;
  string public_key = 3;  // PEM
  string algorithm  = 4;
  bool   is_active  = 5;
}

message ListUserKeysRequest {
  string user_id = 1;
}

message ListUserKeysResponse {
  repeated PublicKeyResponse keys = 1;
}

message RevokeKeyRequest {
  string key_id  = 1;
  string user_id = 2;
}

// ── Admin Key Management Messages ────────────────────────────────
message ListAllKeysRequest {
  int32  page    = 1;
  int32  limit   = 2;
  string status  = 3;  // "active", "revoked", or empty for all
  string user_id = 4;  // optional filter by user
}

message AdminKeyInfo {
  string key_id         = 1;
  string user_id        = 2;
  string public_key     = 3;
  string algorithm      = 4;
  bool   is_active      = 5;
  string created_at     = 6;
  string revoked_at     = 7;
  string user_email     = 8;
  string user_full_name = 9;
  string user_role      = 10;
}

message ListAllKeysResponse {
  repeated AdminKeyInfo items = 1;
  Pagination pagination       = 2;
}

message AdminRevokeKeyRequest {
  string key_id = 1;
}

// ── JWT Key Ring Messages (secret rotation) ──────────────────────
message RotateJwtKeyRequest {
  string purpose = 1;  // "access" | "refresh"
}

message GetJwtKeyRequest {
  string kid = 1;
}

message ListActiveJwtKeysRequest {
  string purpose = 1;  // optional — empty = all purposes
}

message JwtKeyResponse {
  string kid         = 1;
  string purpose     = 2;  // "access" | "refresh"
  string secret      = 3;
  string algorithm   = 4;  // "HS256"
  string status      = 5;  // "active" | "retiring" | "retired"
  string created_at  = 6;
  string retired_at  = 7;
}

message ListJwtKeysResponse {
  repeated JwtKeyResponse items = 1;
}

// ── Access Token Blacklist Messages ───────────────────────────────
message RevokeAccessTokenRequest {
  string jti        = 1;
  string user_id    = 2;
  int64  expires_at = 3;  // unix seconds (jwt `exp`)
}

message IsAccessTokenRevokedRequest {
  string jti = 1;
}

message BoolResponse {
  bool value = 1;
}

// ── Notification Messages ─────────────────────────────────────────
message CreateNotificationRequest {
  string user_id = 1;
  string type    = 2;  // NotificationType enum
  string title   = 3;
  string message = 4;
  string link    = 5;  // optional
  string data    = 6;  // optional, JSON-encoded
}

message NotificationResponse {
  string id         = 1;
  string user_id    = 2;
  string type       = 3;
  string title      = 4;
  string message    = 5;
  string link       = 6;
  string data       = 7;  // JSON-encoded
  bool   is_read    = 8;
  string read_at    = 9;
  string created_at = 10;
}

message ListNotificationsRequest {
  string user_id   = 1;
  int32  page      = 2;
  int32  limit     = 3;
  bool   only_unread = 4;
}

message ListNotificationsResponse {
  repeated NotificationResponse items = 1;
  Pagination pagination               = 2;
}

message UserIdRequest {
  string user_id = 1;
}

message UnreadCountResponse {
  int32 count = 1;
}

message MarkAsReadRequest {
  string id      = 1;
  string user_id = 2;
}

message DeleteNotificationRequest {
  string id      = 1;
  string user_id = 2;
}

message AffectedResponse {
  int32 affected = 1;
}
