version: '3.8'

services:
  user-db:
    image: postgres:16-alpine
    container_name: agritrace-user-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: user_admin
      POSTGRES_PASSWORD: user_pass123
      POSTGRES_DB: agritrace_users
    ports:
      - "5433:5432"
    volumes:
      - user_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user_admin -d agritrace_users"]
      interval: 10s
      timeout: 5s
      retries: 5

  product-db:
    image: postgres:16-alpine
    container_name: agritrace-product-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: product_admin
      POSTGRES_PASSWORD: product_pass123
      POSTGRES_DB: agritrace_products
    ports:
      - "5434:5432"
    volumes:
      - product_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U product_admin -d agritrace_products"]
      interval: 10s
      timeout: 5s
      retries: 5

  trace-db:
    image: postgres:16-alpine
    container_name: agritrace-trace-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: trace_admin
      POSTGRES_PASSWORD: trace_pass123
      POSTGRES_DB: agritrace_traces
    ports:
      - "5435:5432"
    volumes:
      - trace_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U trace_admin -d agritrace_traces"]
      interval: 10s
      timeout: 5s
      retries: 5

  media-db:
    image: postgres:16-alpine
    container_name: agritrace-media-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: media_admin
      POSTGRES_PASSWORD: media_pass123
      POSTGRES_DB: agritrace_media
    ports:
      - "5436:5432"
    volumes:
      - media_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U media_admin -d agritrace_media"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: agritrace-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  user_db_data:
  product_db_data:
  trace_db_data:
  media_db_data:
  redis_data: